<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本电视直播</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  background:linear-gradient(135deg,#0f0f1e 0%,#1a1a2e 100%);
  color:#e0e0e0; min-height:100vh; padding:20px;
}
.container { max-width:1500px; margin:0 auto; }
.header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:20px; padding:16px 22px;
  background:rgba(255,255,255,0.05); border-radius:12px;
  border:1px solid rgba(255,255,255,0.1); gap:16px; flex-wrap:wrap;
}
.header h1 { font-size:20px; font-weight:600; }
.header-actions { display:flex; gap:10px; align-items:center; margin-left:auto; }
.header-info { font-size:13px; color:#999; }
.header-info strong { color:#a8b3e8; }
.btn {
  padding:9px 14px; border:1px solid rgba(102,126,234,0.5);
  background:rgba(102,126,234,0.2); border-radius:6px; color:#a8b3e8;
  font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.btn:hover { background:rgba(102,126,234,0.4); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
#fileInput { display:none; }
.main-layout { display:grid; grid-template-columns:1fr 360px; gap:16px; align-items:start; }
.player-section {
  background:rgba(0,0,0,0.4); border-radius:12px; padding:16px;
  border:1px solid rgba(255,255,255,0.1);
}
.player-wrapper {
  position:relative; width:100%; aspect-ratio:16/9; background:#000;
  border-radius:8px; overflow:hidden; margin-bottom:14px;
}
#player { width:100%; height:100%; display:block; }
.player-empty {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; color:#555; gap:12px;
}
.player-empty .icon { font-size:48px; }
.player-info { display:flex; align-items:center; gap:14px; padding:6px 4px; }
.player-info img {
  width:56px; height:56px; border-radius:8px; object-fit:contain;
  background:#fff; padding:4px; flex-shrink:0;
}
.player-info .pi-text .title { font-size:17px; font-weight:600; color:#fff; }
.player-info .pi-text .category { font-size:12px; color:#888; margin-top:4px; }
.side-panel {
  background:rgba(255,255,255,0.05); border-radius:12px;
  border:1px solid rgba(255,255,255,0.1); overflow:hidden;
  display:flex; flex-direction:column; max-height:680px;
}
.panel-head { padding:14px 14px 10px; border-bottom:1px solid rgba(255,255,255,0.08); }
.search-box {
  width:100%; padding:9px 12px; background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1); border-radius:6px;
  color:#e0e0e0; font-size:13px; margin-bottom:10px;
}
.search-box:focus { outline:none; border-color:rgba(102,126,234,0.5); background:rgba(255,255,255,0.12); }
.search-box::placeholder { color:#666; }
.tabs { display:flex; gap:6px; }
.tab {
  flex:1; padding:7px; text-align:center; font-size:12px; font-weight:600;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  border-radius:6px; cursor:pointer; color:#999; transition:all 0.2s;
}
.tab.active { background:rgba(102,126,234,0.3); color:#fff; border-color:rgba(102,126,234,0.5); }
.panel-hint { font-size:11px; color:#666; margin-top:8px; text-align:center; }
.channel-list { overflow-y:auto; padding:8px; flex:1; }
.list-label { font-size:10px; text-transform:uppercase; letter-spacing:1px;
  color:#666; padding:8px 8px 4px; font-weight:600; }
.channel-item {
  display:flex; align-items:center; gap:10px; padding:8px;
  border-radius:7px; cursor:pointer; transition:all 0.15s; position:relative;
}
.channel-item:hover { background:rgba(255,255,255,0.07); }
.channel-item.playing { background:rgba(102,126,234,0.25); }
.channel-item img {
  width:40px; height:40px; border-radius:6px; object-fit:contain;
  background:#fff; padding:3px; flex-shrink:0;
}
.channel-item .ci-placeholder {
  width:40px; height:40px; border-radius:6px; flex-shrink:0;
  background:linear-gradient(135deg,rgba(102,126,234,0.3),rgba(118,75,162,0.3));
  display:flex; align-items:center; justify-content:center; font-size:9px; color:#aaa; text-align:center;
}
.channel-item .ci-text { flex:1; min-width:0; }
.channel-item .ci-name { font-size:13px; font-weight:500; color:#e0e0e0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.channel-item .ci-sub { font-size:10px; color:#777; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fav-btn { background:none; border:none; font-size:16px; cursor:pointer;
  padding:4px; flex-shrink:0; opacity:0.7; transition:all 0.2s; }
.fav-btn:hover { opacity:1; transform:scale(1.15); }
.no-channels { text-align:center; padding:30px 16px; color:#666; font-size:13px; line-height:1.7; }
.url-import { display:none; gap:8px; margin-top:10px; }
.url-import.show { display:flex; }
.url-import input {
  flex:1; padding:9px 12px; background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:#e0e0e0; font-size:13px;
}
.url-import input:focus { outline:none; border-color:rgba(102,126,234,0.5); }
.explore-load { display:flex; gap:8px; margin-bottom:10px; }
.explore-load input {
  flex:1; padding:9px 12px; background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:#e0e0e0; font-size:12px;
}
.explore-load input:focus { outline:none; border-color:rgba(102,126,234,0.5); }
.explore-status { font-size:12px; color:#888; padding:4px 2px 8px; line-height:1.6; }
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:rgba(30,30,50,0.97); color:#e0e0e0; padding:12px 20px;
  border-radius:8px; border:1px solid rgba(102,126,234,0.5); font-size:13px;
  opacity:0; pointer-events:none; transition:all 0.3s; z-index:1000; max-width:80%;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:rgba(255,255,255,0.04); }
::-webkit-scrollbar-thumb { background:rgba(102,126,234,0.3); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(102,126,234,0.5); }
@media (max-width:900px) {
  .main-layout { grid-template-columns:1fr; }
  .side-panel { max-height:520px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🇯🇵 日本电视直播</h1>
    <div class="header-actions">
      <span class="header-info">频道 <strong id="totalChannels">0</strong> · 收藏 <strong id="favoriteCount">0</strong></span>
      <button class="btn" id="importBtn">导入文件</button>
      <button class="btn" id="importUrlBtn">URL导入</button>
      <input type="file" id="fileInput" accept=".m3u8,.txt,.m3u">
    </div>
  </div>
  <div class="url-import" id="urlImport" style="margin-bottom:16px;">
    <input type="text" id="urlInput" placeholder="粘贴 m3u8 / m3u / txt URL...">
    <button class="btn" id="loadUrlBtn">加载</button>
  </div>
  <div class="main-layout">
    <div class="player-section">
      <div class="player-wrapper">
        <video id="player" controls style="display:none;"></video>
        <div class="player-empty" id="playerEmpty"><div class="icon">📺</div><div>选择频道开始观看</div></div>
      </div>
      <div class="player-info" id="playerInfo"><div class="pi-text"><div class="title">未选择频道</div></div></div>
    </div>
    <div class="side-panel">
      <div class="panel-head">
        <input type="text" class="search-box" id="search" placeholder="🔍 搜索频道...">
        <div class="tabs">
          <div class="tab active" data-tab="all">全部</div>
          <div class="tab" data-tab="fav">❤️ 收藏</div>
        </div>
        <div class="panel-hint">右键频道 = 复制 yt-dlp 下载命令</div>
      </div>
      <div class="channel-list" id="channelList"></div>
    </div>
  </div>
</div>

function parseM3U(content) {
  content = content.replace(/\f/g, '');
  const parts = content.split(/(?=#EXTINF:)/);
  const channels = [];
  for (let part of parts) {
    if (!part.trim().startsWith('#EXTINF:')) continue;
    const block = part.trim();
    const logoMatch = block.match(/tvg-logo="\s*([^"]*?)\s*"/s);
    const logo = logoMatch ? logoMatch[1].replace(/\n/g,'').trim() : '';
    const catMatch = block.match(/group-title="([^"]*)"/);
    const category = catMatch ? catMatch[1].trim() : '其他';
    const urls = block.match(/https?:\/\/[^\s"]+/g) || [];
    let streamUrl = null;
    for (let u of urls) {
      if (u === logo) continue;
      if (/\.(png|jpg|jpeg|gif|webp|svg)(\?|$)/i.test(u)) continue;
      if (/\.m3u8|chunks|chunklist|playlist|index|\/live\/|\.stream|\/HLS\/|:1935|:8000|:9083|:25104|:9443/i.test(u)) { streamUrl = u; break; }
    }
    if (!streamUrl) {
      for (let u of urls) {
        if (u === logo) continue;
        if (/\.(png|jpg|jpeg|gif|webp|svg)(\?|$)/i.test(u)) continue;
        if (/^https?:\/\/[^\/]+\/?$/.test(u)) continue;
        streamUrl = u; break;
      }
    }
    if (!streamUrl) continue;
    const commaIdx = block.indexOf(',');
    if (commaIdx === -1) continue;
    let nameStr = block.slice(commaIdx+1).split('#EXTVLCOPT')[0].split(/https?:\/\//)[0];
    const name = nameStr.split(/\s+/).filter(Boolean).join(' ').trim() || '未知频道';
    channels.push({ id: name+'|'+streamUrl, title:name, url:streamUrl, logo, category });
  }
  return channels;
}
function ytdlpCmd(url) {
  return `yt-dlp -S 'proto' --js-runtimes node --extractor-args "youtube:player_js_variant=main" "${url}"`;
}
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(()=>t.classList.remove('show'), 2200);
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); cb(); } catch(err) { prompt('复制下面的命令:', text); }
  document.body.removeChild(ta);
}
function copyCmd(ch, e) {
  if (e) e.stopPropagation();
  const cmd = ytdlpCmd(ch.url);
  const done = () => showToast('已复制 '+ch.title+' 的下载命令');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(cmd).then(done).catch(()=>fallbackCopy(cmd, done));
  } else { fallbackCopy(cmd, done); }
}
function playChannel(ch, rerender) {
  currentPlayingId = ch.id;
  document.getElementById('playerEmpty').style.display = 'none';
  video.style.display = 'block';
  const pi = document.getElementById('playerInfo');
  pi.innerHTML = (ch.logo ? '<img src="'+ch.logo+'" onerror="this.style.display=\'none\'">' : '') +
    '<div class="pi-text"><div class="title">'+ch.title+'</div><div class="category">'+(ch.category||'')+'</div></div>';
  if (Hls.isSupported()) {
    if (hls) hls.destroy();
    hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(video);
    video.play().catch(()=>{});
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = ch.url; video.play().catch(()=>{});
  }
  if (rerender) rerender();
}

let allChannels = [];
let favorites = new Set();
let currentTab = 'all';

function loadFavorites() {
  const saved = localStorage.getItem('jp_tv_favorites');
  if (saved) favorites = new Set(JSON.parse(saved));
  updateStats();
}
function saveFavorites() { localStorage.setItem('jp_tv_favorites', JSON.stringify([...favorites])); updateStats(); }
function updateStats() {
  document.getElementById('totalChannels').textContent = allChannels.length;
  document.getElementById('favoriteCount').textContent = favorites.size;
}
function toggleFav(id, e) {
  e.stopPropagation();
  if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
  saveFavorites(); render();
}
function makeItem(ch) {
  const isFav = favorites.has(ch.id);
  const item = document.createElement('div');
  item.className = 'channel-item' + (ch.id===currentPlayingId ? ' playing' : '');
  item.innerHTML =
    (ch.logo ? '<img src="'+ch.logo+'" onerror="this.outerHTML=\'<div class=&quot;ci-placeholder&quot;>'+ch.title.slice(0,4)+'</div>\'">'
             : '<div class="ci-placeholder">'+ch.title.slice(0,4)+'</div>') +
    '<div class="ci-text"><div class="ci-name">'+ch.title+'</div></div>' +
    '<button class="fav-btn">'+(isFav?'❤️':'🤍')+'</button>';
  item.querySelector('.fav-btn').addEventListener('click', e => toggleFav(ch.id, e));
  item.addEventListener('click', () => playChannel(ch, render));
  item.addEventListener('contextmenu', e => { e.preventDefault(); copyCmd(ch, e); });
  return item;
}
function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('channelList');
  list.innerHTML = '';
  let pool = allChannels.filter(ch => ch.title.toLowerCase().includes(search));
  if (currentTab === 'fav') pool = pool.filter(ch => favorites.has(ch.id));
  if (pool.length === 0) { list.innerHTML = '<div class="no-channels">'+(currentTab==='fav'?'还没有收藏频道':'未找到频道')+'</div>'; return; }
  const favs = pool.filter(ch => favorites.has(ch.id));
  const rest = pool.filter(ch => !favorites.has(ch.id));
  if (currentTab === 'all' && favs.length > 0) {
    const l1=document.createElement('div'); l1.className='list-label'; l1.textContent='❤️ 收藏'; list.appendChild(l1);
    favs.forEach(ch => list.appendChild(makeItem(ch)));
    const l2=document.createElement('div'); l2.className='list-label'; l2.textContent='全部频道'; list.appendChild(l2);
    rest.forEach(ch => list.appendChild(makeItem(ch)));
  } else { pool.forEach(ch => list.appendChild(makeItem(ch))); }
}
function importChannels(content) {
  const newCh = parseM3U(content);
  if (newCh.length > 0) {
    const existing = new Set(allChannels.map(c=>c.id));
    const added = newCh.filter(c => !existing.has(c.id));
    allChannels = [...allChannels, ...added];
    updateStats(); render();
    document.getElementById('urlInput').value = '';
    showToast('已导入 '+added.length+' 个新频道');
  } else { showToast('未找到有效频道'); }
}
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); currentTab = t.dataset.tab; render();
  });
});
document.getElementById('search').addEventListener('input', render);
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e=>{
  const f = e.target.files[0];
  if (f) { const r = new FileReader(); r.onload = ev=>importChannels(ev.target.result); r.readAsText(f); }
});
document.getElementById('importUrlBtn').addEventListener('click', ()=>document.getElementById('urlImport').classList.toggle('show'));
document.getElementById('loadUrlBtn').addEventListener('click', async ()=>{
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { showToast('请输入 URL'); return; }
  const btn = document.getElementById('loadUrlBtn'); btn.disabled = true; btn.textContent = '加载中...';
  try { const res = await fetch(url); importChannels(await res.text()); }
  catch(err) { showToast('加载失败: '+err.message); }
  finally { btn.disabled = false; btn.textContent = '加载'; }
});
loadFavorites();
allChannels = defaultChannels;
updateStats();
render();
</script>
</body>
